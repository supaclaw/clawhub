version: "3.9"

services:
  clawhub:
    image: craftslab/clawhub:latest
    ports:
      - "3000:3000"
    volumes:
      - ./storage:/storage
    environment:
      VITE_SITE_URL: http://localhost:3000
      SITE_URL: http://localhost:3000
      VITE_SITE_MODE: skills
      VITE_SOULHUB_SITE_URL: http://localhost:3000
      VITE_SOULHUB_HOST: localhost
      VITE_CONVEX_SITE_URL: http://localhost:3000
      CONVEX_SITE_URL: http://localhost:3000
      # Placeholder only so the frontend can initialize without an external Convex deployment.
      VITE_CONVEX_URL: http://127.0.0.1:3210
    command: ["bun", "run", "preview", "--host", "0.0.0.0", "--port", "3000"]
    restart: unless-stopped
